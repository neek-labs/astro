name: Refresh Session Planner Forecast

on:
  # GitHub cron is UTC. This runs around 08:15 MDT or 07:15 MST in Calgary.
  schedule:
    - cron: "15 14 * * *"
  workflow_dispatch:

concurrency:
  group: session-planner-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Generate, validate, and merge forecast
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AUTOMATION_BRANCH: automation/session-planner-refresh
      PR_TITLE: "[automation] Refresh session planner forecast"

    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Record generation base
        id: base
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall planner scripts

      - name: Run tests before generation
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest 2>&1 | tee "${RUNNER_TEMP}/session-planner-tests-before.log"

      - name: Generate weather forecast with bounded retry
        shell: bash
        run: |
          set -euo pipefail
          generation_log="${RUNNER_TEMP}/session-planner-generation.log"
          : > "${generation_log}"
          status=1
          for attempt in 1 2 3; do
            echo "Weather generation attempt ${attempt} of 3" | tee -a "${generation_log}"
            if python scripts/generate_session_forecast.py 2>&1 | tee -a "${generation_log}"; then
              status=0
              break
            else
              status=$?
            fi
            if [[ "${attempt}" -lt 3 ]]; then
              echo "Weather generation failed; retrying in 10 seconds." | tee -a "${generation_log}"
              sleep 10
            fi
          done
          exit "${status}"

      - name: Generate target visibility and lunar impact
        shell: bash
        run: |
          set -euo pipefail
          python scripts/calculate_target_visibility.py 2>&1 | tee -a "${RUNNER_TEMP}/session-planner-generation.log"

      - name: Generate final target recommendations
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_target_recommendations.py 2>&1 | tee -a "${RUNNER_TEMP}/session-planner-generation.log"

      - name: Validate complete generated state
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_session_planner_pipeline.py 2>&1 | tee "${RUNNER_TEMP}/session-planner-validation.log"

      - name: Run tests after generation
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest 2>&1 | tee "${RUNNER_TEMP}/session-planner-tests-after.log"

      - name: Enforce generated-file allowlist
        run: python scripts/check_session_planner_changes.py

      - name: Inspect generated diff
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --stat -- data/session-planner.json data/astronomy-target-visibility.json
          git diff --numstat -- data/session-planner.json data/astronomy-target-visibility.json

      - name: Build review summary
        run: python scripts/summarize_session_planner_pipeline.py --output "${RUNNER_TEMP}/session-planner-summary.md"

      - name: Write Actions summary
        shell: bash
        run: |
          set -euo pipefail
          cat "${RUNNER_TEMP}/session-planner-summary.md" >> "${GITHUB_STEP_SUMMARY}"

      - name: Detect generated changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- data/session-planner.json data/astronomy-target-visibility.json; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "No generated data changed; no branch or pull request update is needed."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Update rolling branch and review pull request
        id: publication
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          BASE_SHA: ${{ steps.base.outputs.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          bot_email="41898282+github-actions[bot]@users.noreply.github.com"
          summary_file="${RUNNER_TEMP}/session-planner-summary.md"
          remote_exists=false
          remote_sha=""
          pushed=false

          git fetch --no-tags origin main
          if [[ "$(git rev-parse origin/main)" != "${BASE_SHA}" ]]; then
            echo "Main advanced during generation; refusing to publish from a stale base." >&2
            exit 1
          fi
          remote_line="$(git ls-remote --heads origin "${AUTOMATION_BRANCH}")"
          if [[ -n "${remote_line}" ]]; then
            remote_exists=true
            remote_sha="${remote_line%%[[:space:]]*}"
            git fetch --no-tags origin \
              "refs/heads/${AUTOMATION_BRANCH}:refs/remotes/origin/${AUTOMATION_BRANCH}"
            python scripts/check_session_planner_changes.py \
              --base origin/main \
              --head "origin/${AUTOMATION_BRANCH}"

            while IFS= read -r author_email; do
              if [[ -n "${author_email}" && "${author_email}" != "${bot_email}" ]]; then
                echo "Refusing to overwrite a non-bot commit on ${AUTOMATION_BRANCH}." >&2
                exit 1
              fi
            done < <(git log --format='%ae' "origin/main..origin/${AUTOMATION_BRANCH}")
          fi

          open_pr="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${AUTOMATION_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          rollback_publication() {
            exit_status=$?
            if [[ "${pushed}" == true ]]; then
              echo "Publication failed; restoring the previous automation branch state." >&2
              current_sha="$(git ls-remote --heads origin "${AUTOMATION_BRANCH}" | cut -f1)"
              if [[ "${remote_exists}" == true ]]; then
                git push \
                  --force-with-lease="refs/heads/${AUTOMATION_BRANCH}:${current_sha}" \
                  origin "${remote_sha}:refs/heads/${AUTOMATION_BRANCH}" || true
              else
                git push origin --delete "${AUTOMATION_BRANCH}" || true
              fi
            fi
            exit "${exit_status}"
          }
          trap rollback_publication ERR

          git config user.name "github-actions[bot]"
          git config user.email "${bot_email}"
          git switch -C "${AUTOMATION_BRANCH}" "${BASE_SHA}"
          git add -- data/session-planner.json data/astronomy-target-visibility.json
          git commit -m "chore: refresh session planner forecast"

          if [[ "${remote_exists}" == true ]]; then
            git push \
              --force-with-lease="refs/heads/${AUTOMATION_BRANCH}:${remote_sha}" \
              origin "HEAD:refs/heads/${AUTOMATION_BRANCH}"
          else
            git push origin "HEAD:refs/heads/${AUTOMATION_BRANCH}"
          fi
          pushed=true

          if [[ -n "${open_pr}" ]]; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/pulls/${open_pr}" \
              --raw-field title="${PR_TITLE}" \
              --field body=@"${summary_file}" > /dev/null
            echo "Updated existing Session Planner refresh pull request."
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${AUTOMATION_BRANCH}" \
              --title "${PR_TITLE}" \
              --body-file "${summary_file}"
          fi

          pr_number="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${AUTOMATION_BRANCH}" \
            --state open \
            --json number \
            --jq 'if length == 1 then .[0].number else empty end')"
          if [[ -z "${pr_number}" ]]; then
            echo "Could not identify exactly one rolling automation pull request." >&2
            exit 1
          fi
          echo "pr_number=${pr_number}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          trap - ERR

      - name: Verify and squash-merge automation pull request
        if: >-
          steps.changes.outputs.changed == 'true' &&
          vars.SESSION_PLANNER_AUTO_MERGE != 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ steps.base.outputs.sha }}
          PR_NUMBER: ${{ steps.publication.outputs.pr_number }}
          HEAD_SHA: ${{ steps.publication.outputs.head_sha }}
        run: |
          python scripts/merge_session_planner_pr.py \
            --repository "${GITHUB_REPOSITORY}" \
            --pr-number "${PR_NUMBER}" \
            --expected-head-sha "${HEAD_SHA}" \
            --expected-base-sha "${BASE_SHA}"

      - name: Record disabled automatic merge
        if: >-
          steps.changes.outputs.changed == 'true' &&
          vars.SESSION_PLANNER_AUTO_MERGE == 'false'
        env:
          PR_NUMBER: ${{ steps.publication.outputs.pr_number }}
        run: |
          python scripts/merge_session_planner_pr.py \
            --pr-number "${PR_NUMBER}" \
            --summary-only-result "Skipped because SESSION_PLANNER_AUTO_MERGE is false"

      - name: Record no-change merge result
        if: steps.changes.outputs.changed == 'false'
        run: |
          python scripts/merge_session_planner_pr.py \
            --summary-only-result "Not needed because generated data did not change"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: session-planner-refresh-diagnostics-${{ github.run_id }}
          path: |
            data/session-planner.json
            data/astronomy-target-visibility.json
            ${{ runner.temp }}/session-planner-*.log
            ${{ runner.temp }}/session-planner-summary.md
          if-no-files-found: ignore
          retention-days: 3
