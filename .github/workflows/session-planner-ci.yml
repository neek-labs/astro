name: Session Planner CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "planner/**"
      - "scripts/**"
      - "tests/**"
      - "config/session-planner.json"
      - "data/session-planner.json"
      - "data/astronomy-target-visibility.json"
      - "data/astronomy-targets-master-stage3b-coordinates.json"
      - "requirements.txt"
      - "session-planner.html"
      - "session-planner.js"
      - "style.css"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "planner/**"
      - "scripts/**"
      - "tests/**"
      - "config/session-planner.json"
      - "data/session-planner.json"
      - "data/astronomy-target-visibility.json"
      - "data/astronomy-targets-master-stage3b-coordinates.json"
      - "requirements.txt"
      - "session-planner.html"
      - "session-planner.js"
      - "style.css"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Test and compile
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall planner scripts

      - name: Run complete test suite
        run: python -m pytest
